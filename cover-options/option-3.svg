<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="rgba(240,240,255,0.15)"/>
    </pattern>
    <linearGradient id="fadeUp" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#4ade80" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1280" height="640" fill="#07070c"/>

  <!-- Ambient blobs -->
  <circle cx="200" cy="320" r="300" fill="#4ade80" opacity="0.04" filter="url(#blur3)"/>
  <circle cx="1080" cy="320" r="300" fill="#fbbf24" opacity="0.04" filter="url(#blur3)"/>
  <circle cx="640" cy="200" r="250" fill="#a78bfa" opacity="0.03" filter="url(#blur3)"/>

  <!-- Dot pattern -->
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- ===== Isometric Minecraft Block (left center) ===== -->
  <g transform="translate(340, 220)">
    <!-- Top face (grass) -->
    <polygon points="0,0 80,-46 160,0 80,46" fill="#22c55e" stroke="#1a9a48" stroke-width="1"/>
    <polygon points="0,0 80,-46 160,0 80,46" fill="rgba(255,255,255,0.05)"/>
    <!-- Grid lines on top -->
    <line x1="40" y1="-23" x2="120" y2="23" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
    <line x1="80" y1="-46" x2="80" y2="46" stroke="rgba(0,0,0,0.15)" stroke-width="0.5" transform="rotate(0,80,0)"/>

    <!-- Left face (dirt) -->
    <polygon points="0,0 80,46 80,130 0,84" fill="#a16207" stroke="#7c4d08" stroke-width="1"/>
    <polygon points="0,0 80,46 80,130 0,84" fill="rgba(0,0,0,0.1)"/>
    <!-- Grid lines on left -->
    <line x1="0" y1="42" x2="80" y2="88" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>

    <!-- Right face (dirt lighter) -->
    <polygon points="160,0 80,46 80,130 160,84" fill="#b45309" stroke="#7c4d08" stroke-width="1"/>
    <!-- Grid lines on right -->
    <line x1="160" y1="42" x2="80" y2="88" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>

    <!-- Pixel detail on grass -->
    <rect x="65" y="-8" width="8" height="8" fill="#16a34a" opacity="0.5" transform="skewY(-30) skewX(0)"/>
  </g>

  <!-- ===== Transform effect (center) ===== -->
  <g transform="translate(540, 280)">
    <!-- Dissolving particles -->
    <rect x="0" y="-20" width="4" height="4" fill="#22c55e" opacity="0.7" transform="rotate(15)"/>
    <rect x="20" y="-10" width="3" height="3" fill="#a16207" opacity="0.6"/>
    <rect x="40" y="-30" width="5" height="5" fill="#6b7280" opacity="0.5" transform="rotate(-20)"/>
    <rect x="60" y="0" width="3" height="3" fill="#fbbf24" opacity="0.6"/>
    <rect x="80" y="-15" width="4" height="4" fill="#ef4444" opacity="0.7" transform="rotate(30)"/>
    <rect x="100" y="5" width="3" height="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="120" y="-25" width="5" height="5" fill="#4ade80" opacity="0.4"/>
    <rect x="140" y="-5" width="3" height="3" fill="#ef4444" opacity="0.6" transform="rotate(-15)"/>
    <rect x="160" y="-20" width="4" height="4" fill="#fbbf24" opacity="0.7"/>
    <rect x="180" y="10" width="3" height="3" fill="#3b82f6" opacity="0.5" transform="rotate(25)"/>
    <!-- Arrow -->
    <line x1="20" y1="30" x2="180" y2="30" stroke="rgba(240,240,255,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="185,25 195,30 185,35" fill="rgba(240,240,255,0.2)"/>
  </g>

  <!-- ===== Isometric LEGO Brick (right center) ===== -->
  <g transform="translate(780, 220)">
    <!-- Top face -->
    <polygon points="0,0 80,-46 160,0 80,46" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
    <!-- Studs on top (isometric circles = ellipses) -->
    <ellipse cx="50" cy="-10" rx="10" ry="6" fill="#ef4444" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <ellipse cx="110" cy="-10" rx="10" ry="6" fill="#ef4444" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <ellipse cx="50" cy="14" rx="10" ry="6" fill="#ef4444" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <ellipse cx="110" cy="14" rx="10" ry="6" fill="#ef4444" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Stud tops -->
    <ellipse cx="50" cy="-14" rx="10" ry="6" fill="#f87171" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <ellipse cx="110" cy="-14" rx="10" ry="6" fill="#f87171" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <ellipse cx="50" cy="10" rx="10" ry="6" fill="#f87171" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <ellipse cx="110" cy="10" rx="10" ry="6" fill="#f87171" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

    <!-- Left face -->
    <polygon points="0,0 80,46 80,110 0,64" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>

    <!-- Right face -->
    <polygon points="160,0 80,46 80,110 160,64" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  </g>

  <!-- ===== Smaller floating blocks ===== -->
  <!-- Mini Minecraft dirt block -->
  <g transform="translate(160, 150)" opacity="0.5">
    <polygon points="0,0 30,-17 60,0 30,17" fill="#22c55e"/>
    <polygon points="0,0 30,17 30,50 0,33" fill="#a16207"/>
    <polygon points="60,0 30,17 30,50 60,33" fill="#b45309"/>
  </g>

  <!-- Mini LEGO blue block -->
  <g transform="translate(1050, 160)" opacity="0.5">
    <polygon points="0,0 30,-17 60,0 30,17" fill="#3b82f6"/>
    <polygon points="0,0 30,17 30,45 0,28" fill="#2563eb"/>
    <polygon points="60,0 30,17 30,45 60,28" fill="#3b82f6"/>
    <ellipse cx="15" cy="-4" rx="5" ry="3" fill="#60a5fa" opacity="0.6"/>
    <ellipse cx="45" cy="-4" rx="5" ry="3" fill="#60a5fa" opacity="0.6"/>
  </g>

  <!-- Mini gold LEGO -->
  <g transform="translate(1100, 400)" opacity="0.4">
    <polygon points="0,0 25,-14 50,0 25,14" fill="#fbbf24"/>
    <polygon points="0,0 25,14 25,38 0,24" fill="#d97706"/>
    <polygon points="50,0 25,14 25,38 50,24" fill="#fbbf24"/>
  </g>

  <!-- Mini diamond block -->
  <g transform="translate(120, 420)" opacity="0.35">
    <polygon points="0,0 20,-12 40,0 20,12" fill="#67e8f9"/>
    <polygon points="0,0 20,12 20,32 0,20" fill="#22d3ee"/>
    <polygon points="40,0 20,12 20,32 40,20" fill="#67e8f9"/>
  </g>

  <!-- ===== Typography ===== -->
  <!-- Main title -->
  <text x="640" y="500" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="48" letter-spacing="2">
    <tspan fill="#f0f0ff">MC</tspan>
    <tspan fill="rgba(240,240,255,0.2)" dx="10" font-size="28">///</tspan>
    <tspan fill="#fbbf24" dx="10">LEGO</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="540" text-anchor="middle" font-family="'DM Sans', 'Segoe UI', sans-serif" font-size="16" fill="rgba(240,240,255,0.4)" letter-spacing="6">
    BUILD BEYOND THE SCREEN
  </text>

  <!-- Accent line -->
  <line x1="240" y1="565" x2="1040" y2="565" stroke="url(#accentLine)" stroke-width="1"/>

  <!-- Stats bar -->
  <g transform="translate(640, 590)" text-anchor="middle">
    <text font-family="monospace" font-size="10" fill="rgba(74,222,128,0.4)" letter-spacing="2">
      <tspan>6,000+ BRICK PARTS</tspan>
      <tspan dx="40" fill="rgba(240,240,255,0.15)">|</tspan>
      <tspan dx="40" fill="rgba(251,191,36,0.4)">200+ BLOCK TYPES</tspan>
      <tspan dx="40" fill="rgba(240,240,255,0.15)">|</tspan>
      <tspan dx="40" fill="rgba(103,232,249,0.4)">3D PREVIEW</tspan>
    </text>
  </g>

  <!-- Fade overlay at bottom -->
  <rect x="0" y="580" width="1280" height="60" fill="url(#fadeUp)" opacity="0.5"/>
</svg>