<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <pattern id="pixelGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none" stroke="rgba(100,100,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c1a"/>
      <stop offset="40%" stop-color="#0f1028"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a0e"/>
      <stop offset="100%" stop-color="#0a1a05"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="30%" r="25%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="640" fill="url(#skyGrad)"/>
  <rect width="1280" height="640" fill="url(#pixelGrid)"/>
  <rect width="1280" height="640" fill="url(#moonGlow)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="120" cy="60" r="1.2"/><circle cx="250" cy="100" r="0.8"/>
    <circle cx="400" cy="45" r="1.5"/><circle cx="520" cy="130" r="0.7"/>
    <circle cx="640" cy="30" r="1.8"/><circle cx="780" cy="80" r="1"/>
    <circle cx="900" cy="55" r="1.3"/><circle cx="1050" cy="110" r="0.9"/>
    <circle cx="1160" cy="40" r="1.6"/><circle cx="180" cy="150" r="0.6"/>
    <circle cx="700" cy="160" r="0.5"/><circle cx="1000" cy="30" r="0.8"/>
    <circle cx="340" cy="180" r="0.7"/><circle cx="860" cy="150" r="1.1"/>
  </g>

  <!-- Moon -->
  <g filter="url(#bigGlow)">
    <circle cx="640" cy="160" r="50" fill="#67e8f9" opacity="0.08"/>
  </g>
  <circle cx="640" cy="160" r="28" fill="#e2e8f0" opacity="0.15"/>
  <circle cx="640" cy="160" r="26" fill="#f0f4f8" opacity="0.08"/>

  <!-- Ground -->
  <rect x="0" y="440" width="1280" height="200" fill="url(#groundGrad)" opacity="0.9"/>
  <!-- Grass blocks pixel effect -->
  <g opacity="0.7">
    <rect x="0" y="430" width="32" height="16" fill="#4ade80"/><rect x="0" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="32" y="430" width="32" height="16" fill="#22c55e"/><rect x="32" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="64" y="430" width="32" height="16" fill="#4ade80"/><rect x="64" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="96" y="430" width="32" height="16" fill="#22c55e"/><rect x="96" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="128" y="430" width="32" height="16" fill="#4ade80"/><rect x="128" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="160" y="430" width="32" height="16" fill="#22c55e"/><rect x="160" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="192" y="430" width="32" height="16" fill="#4ade80"/><rect x="192" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="224" y="430" width="32" height="16" fill="#22c55e"/><rect x="224" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="256" y="430" width="32" height="16" fill="#4ade80"/><rect x="256" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="288" y="430" width="32" height="16" fill="#22c55e"/><rect x="288" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="320" y="430" width="32" height="16" fill="#4ade80"/><rect x="320" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="352" y="430" width="32" height="16" fill="#22c55e"/><rect x="352" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="384" y="430" width="32" height="16" fill="#4ade80"/><rect x="384" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="416" y="430" width="32" height="16" fill="#22c55e"/><rect x="416" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="448" y="430" width="32" height="16" fill="#4ade80"/><rect x="448" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="480" y="430" width="32" height="16" fill="#22c55e"/><rect x="480" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="512" y="430" width="32" height="16" fill="#4ade80"/><rect x="512" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="544" y="430" width="32" height="16" fill="#22c55e"/><rect x="544" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="576" y="430" width="32" height="16" fill="#4ade80"/><rect x="576" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="608" y="430" width="32" height="16" fill="#22c55e"/><rect x="608" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="640" y="430" width="32" height="16" fill="#4ade80"/><rect x="640" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="672" y="430" width="32" height="16" fill="#22c55e"/><rect x="672" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="704" y="430" width="32" height="16" fill="#4ade80"/><rect x="704" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="736" y="430" width="32" height="16" fill="#22c55e"/><rect x="736" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="768" y="430" width="32" height="16" fill="#4ade80"/><rect x="768" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="800" y="430" width="32" height="16" fill="#22c55e"/><rect x="800" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="832" y="430" width="32" height="16" fill="#4ade80"/><rect x="832" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="864" y="430" width="32" height="16" fill="#22c55e"/><rect x="864" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="896" y="430" width="32" height="16" fill="#4ade80"/><rect x="896" y="446" width="32" height="16" fill="#a16207"/>
