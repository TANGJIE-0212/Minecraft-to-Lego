    <rect x="960" y="430" width="32" height="16" fill="#4ade80"/><rect x="960" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="992" y="430" width="32" height="16" fill="#22c55e"/><rect x="992" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="1024" y="430" width="32" height="16" fill="#4ade80"/><rect x="1024" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="1056" y="430" width="32" height="16" fill="#22c55e"/><rect x="1056" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="1088" y="430" width="32" height="16" fill="#4ade80"/><rect x="1088" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="1120" y="430" width="32" height="16" fill="#22c55e"/><rect x="1120" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="1152" y="430" width="32" height="16" fill="#4ade80"/><rect x="1152" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="1184" y="430" width="32" height="16" fill="#22c55e"/><rect x="1184" y="446" width="32" height="16" fill="#92400e"/>
    <rect x="1216" y="430" width="32" height="16" fill="#4ade80"/><rect x="1216" y="446" width="32" height="16" fill="#a16207"/>
    <rect x="1248" y="430" width="32" height="16" fill="#22c55e"/><rect x="1248" y="446" width="32" height="16" fill="#92400e"/>
  </g>

  <!-- ===== Left: Pixelated Minecraft Castle ===== -->
  <g transform="translate(100, 200)" opacity="0.85">
    <!-- Tower left -->
    <rect x="0" y="80" width="48" height="150" fill="#6b7280"/>
    <rect x="0" y="60" width="12" height="20" fill="#6b7280"/>
    <rect x="18" y="60" width="12" height="20" fill="#6b7280"/>
    <rect x="36" y="60" width="12" height="20" fill="#6b7280"/>
    <!-- Main wall -->
    <rect x="48" y="120" width="160" height="110" fill="#6b7280"/>
    <!-- Windows -->
    <rect x="70" y="150" width="20" height="28" fill="#fbbf24" opacity="0.6"/>
    <rect x="110" y="150" width="20" height="28" fill="#fbbf24" opacity="0.6"/>
    <rect x="160" y="150" width="20" height="28" fill="#fbbf24" opacity="0.6"/>
    <!-- Gate -->
    <rect x="100" y="190" width="40" height="40" fill="#1a1a2e"/>
    <!-- Tower right -->
    <rect x="208" y="80" width="48" height="150" fill="#6b7280"/>
    <rect x="208" y="60" width="12" height="20" fill="#6b7280"/>
    <rect x="226" y="60" width="12" height="20" fill="#6b7280"/>
    <rect x="244" y="60" width="12" height="20" fill="#6b7280"/>
    <!-- Flags -->
    <line x1="24" y1="60" x2="24" y2="20" stroke="#6b7280" stroke-width="2"/>
    <rect x="26" y="22" width="24" height="16" fill="#ef4444" opacity="0.8"/>
    <line x1="232" y1="60" x2="232" y2="20" stroke="#6b7280" stroke-width="2"/>
    <rect x="234" y="22" width="24" height="16" fill="#3b82f6" opacity="0.8"/>
  </g>

  <!-- ===== Center: Dissolve/transform particles ===== -->
  <g filter="url(#softGlow)">
    <!-- Particles flying from Minecraft to LEGO -->
    <rect x="440" y="240" width="6" height="6" fill="#4ade80" opacity="0.7" transform="rotate(15, 443, 243)"/>
    <rect x="470" y="280" width="5" height="5" fill="#fbbf24" opacity="0.6" transform="rotate(-20, 472, 282)"/>
    <rect x="500" y="260" width="7" height="7" fill="#67e8f9" opacity="0.5" transform="rotate(30, 503, 263)"/>
    <rect x="530" y="300" width="4" height="4" fill="#ef4444" opacity="0.7"/>
    <rect x="560" y="250" width="6" height="6" fill="#a78bfa" opacity="0.6" transform="rotate(-10, 563, 253)"/>
    <rect x="590" y="290" width="5" height="5" fill="#4ade80" opacity="0.5"/>
    <rect x="620" y="270" width="7" height="7" fill="#fbbf24" opacity="0.7" transform="rotate(45, 623, 273)"/>
    <rect x="650" y="310" width="4" height="4" fill="#67e8f9" opacity="0.6"/>
    <rect x="680" y="255" width="6" height="6" fill="#ef4444" opacity="0.5" transform="rotate(20, 683, 258)"/>
    <rect x="710" y="285" width="5" height="5" fill="#3b82f6" opacity="0.7"/>
    <rect x="740" y="265" width="4" height="4" fill="#fbbf24" opacity="0.6" transform="rotate(-30, 742, 267)"/>
    <rect x="760" y="295" width="6" height="6" fill="#4ade80" opacity="0.5"/>
  </g>

  <!-- ===== Right: LEGO version of castle ===== -->
  <g transform="translate(840, 200)" opacity="0.85">
    <!-- Tower left - LEGO style with studs -->
    <rect x="0" y="80" width="48" height="150" rx="2" fill="#ef4444"/>
    <g fill="#ef4444" stroke="rgba(255,255,255,0.25)" stroke-width="0.5">
      <circle cx="12" cy="88" r="5"/><circle cx="36" cy="88" r="5"/>
      <circle cx="12" cy="108" r="5"/><circle cx="36" cy="108" r="5"/>
      <circle cx="12" cy="128" r="5"/><circle cx="36" cy="128" r="5"/>
      <circle cx="12" cy="148" r="5"/><circle cx="36" cy="148" r="5"/>
      <circle cx="12" cy="168" r="5"/><circle cx="36" cy="168" r="5"/>
    </g>
    <!-- Main wall - LEGO -->
    <rect x="48" y="120" width="160" height="110" rx="2" fill="#3b82f6"/>
    <g fill="#3b82f6" stroke="rgba(255,255,255,0.2)" stroke-width="0.5">
      <circle cx="68" cy="128" r="5"/><circle cx="88" cy="128" r="5"/><circle cx="108" cy="128" r="5"/>
      <circle cx="128" cy="128" r="5"/><circle cx="148" cy="128" r="5"/><circle cx="168" cy="128" r="5"/><circle cx="188" cy="128" r="5"/>
    </g>
    <!-- Windows - LEGO -->
    <rect x="70" y="150" width="20" height="28" rx="2" fill="#fbbf24" opacity="0.8"/>
    <rect x="110" y="150" width="20" height="28" rx="2" fill="#fbbf24" opacity="0.8"/>
    <rect x="160" y="150" width="20" height="28" rx="2" fill="#fbbf24" opacity="0.8"/>
    <!-- Gate -->
    <rect x="100" y="190" width="40" height="40" rx="3" fill="#1a1a2e"/>
    <!-- Tower right - LEGO -->
    <rect x="208" y="80" width="48" height="150" rx="2" fill="#ef4444"/>
    <g fill="#ef4444" stroke="rgba(255,255,255,0.25)" stroke-width="0.5">
      <circle cx="220" cy="88" r="5"/><circle cx="244" cy="88" r="5"/>
      <circle cx="220" cy="108" r="5"/><circle cx="244" cy="108" r="5"/>
      <circle cx="220" cy="128" r="5"/><circle cx="244" cy="128" r="5"/>
      <circle cx="220" cy="148" r="5"/><circle cx="244" cy="148" r="5"/>
      <circle cx="220" cy="168" r="5"/><circle cx="244" cy="168" r="5"/>
    </g>
    <!-- Roof - LEGO yellow -->
    <rect x="-4" y="64" width="56" height="18" rx="2" fill="#fbbf24"/>
    <rect x="204" y="64" width="56" height="18" rx="2" fill="#fbbf24"/>
    <g fill="#fbbf24" stroke="rgba(255,255,255,0.2)" stroke-width="0.5">
      <circle cx="8" cy="62" r="4"/><circle cx="22" cy="62" r="4"/><circle cx="36" cy="62" r="4"/>
      <circle cx="216" cy="62" r="4"/><circle cx="230" cy="62" r="4"/><circle cx="244" cy="62" r="4"/>
    </g>
    <!-- Green baseplate -->
    <rect x="-10" y="230" width="276" height="12" rx="2" fill="#22c55e"/>
    <g fill="#22c55e" stroke="rgba(255,255,255,0.15)" stroke-width="0.5">
      <circle cx="4" cy="228" r="4"/><circle cx="24" cy="228" r="4"/><circle cx="44" cy="228" r="4"/>
      <circle cx="64" cy="228" r="4"/><circle cx="84" cy="228" r="4"/><circle cx="104" cy="228" r="4"/>
      <circle cx="124" cy="228" r="4"/><circle cx="144" cy="228" r="4"/><circle cx="164" cy="228" r="4"/>
      <circle cx="184" cy="228" r="4"/><circle cx="204" cy="228" r="4"/><circle cx="224" cy="228" r="4"/>
      <circle cx="244" cy="228" r="4"/>
    </g>
  </g>

  <!-- ===== Title ===== -->
  <text x="640" y="560" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="42" letter-spacing="1">
    <tspan fill="#f0f0ff">Minecraft</tspan>
    <tspan fill="#a78bfa" dx="8">→</tspan>
    <tspan fill="#fbbf24" dx="8">LEGO</tspan>
  </text>
  <text x="640" y="595" text-anchor="middle" font-family="monospace" font-size="12" fill="rgba(74,222,128,0.5)" letter-spacing="5">
    ONE BRICK AT A TIME
  </text>

  <!-- Bottom glow line -->
  <line x1="340" y1="620" x2="940" y2="620" stroke="url(#bottomLine)" stroke-width="1" opacity="0.4"/>
  <defs>
    <linearGradient id="bottomLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="80%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
